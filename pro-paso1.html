<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Calculadora Pro - Paso 1 | Fitness Gym</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="calculadora-container">
        <div class="calculadora-wrapper">
            
            <div class="calc-header">
                <a href="index.html" class="back-link">← Volver al menú</a>
                <h1 class="calc-title">
                    Calculadora <span class="calc-title-red">Pro</span>
                </h1>
                <div class="progress-bar">
                    <div class="progress-step active">1</div>
                    <div class="progress-line"></div>
                    <div class="progress-step">2</div>
                    <div class="progress-line"></div>
                    <div class="progress-step">3</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Peso (kg)</label>
                <input type="number" id="peso" class="form-input" placeholder="Ej: 75.5" step="0.1">
            </div>

            <div class="form-group">
                <label class="form-label">% Grasa corporal</label>
                <input type="number" id="grasa" class="form-input" placeholder="Ej: 15" step="0.1">
                <p class="form-hint">Debe estar entre 5% y 50%</p>
            </div>

            <button class="btn-principal" onclick="guardarYAvanzar()">Siguiente</button>
        </div>
    </div>

    <script src="js/calculadora.js"></script>
    <script>
        function guardarYAvanzar() {
            const peso = document.getElementById('peso').value;
            const grasa = document.getElementById('grasa').value;

            if (!peso || !grasa) {
                mostrarError('Por favor completa todos los campos para continuar.');
                return;
            }

            const grasaNum = parseFloat(grasa);
            if (grasaNum < 5 || grasaNum > 50) {
                mostrarErrorRango('El % de grasa corporal', 5, 50);
                return;
            }

            localStorage.setItem('pro_peso', peso);
            localStorage.setItem('pro_grasa', grasa);
            window.location.href = 'pro-paso2.html';
        }
    </script>
</body>
</html>
