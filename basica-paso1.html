<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Calculadora Básica - Paso 1 | Fitness Gym</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="calculadora-container">
        <div class="calculadora-wrapper">
            
            <!-- Header -->
            <div class="calc-header">
                <a href="index.html" class="back-link">← Volver al menú</a>
                <h1 class="calc-title">
                    Calculadora <span class="calc-title-red">Básica</span>
                </h1>
                <!-- Barra de progreso -->
                <div class="progress-bar">
                    <div class="progress-step active">1</div>
                    <div class="progress-line"></div>
                    <div class="progress-step">2</div>
                    <div class="progress-line"></div>
                    <div class="progress-step">3</div>
                    <div class="progress-line"></div>
                    <div class="progress-step">4</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Selecciona tu género</label>
                <div class="generos-grid">
                    <div class="genero-btn" id="btnHombre" onclick="seleccionarGenero('hombre')">
                        <div class="genero-icon">♂️</div>
                        <div class="genero-text">Hombre</div>
                    </div>
                    <div class="genero-btn" id="btnMujer" onclick="seleccionarGenero('mujer')">
                        <div class="genero-icon">♀️</div>
                        <div class="genero-text">Mujer</div>
                    </div>
                </div>
            </div>

            <button class="btn-principal" onclick="guardarYAvanzar()">Siguiente</button>
        </div>
    </div>

    <script>
        let generoSeleccionado = 'hombre';

        function seleccionarGenero(genero) {
            generoSeleccionado = genero;
            
            // Actualizar estilos visuales
            const btnHombre = document.getElementById('btnHombre');
            const btnMujer = document.getElementById('btnMujer');
            
            if (genero === 'hombre') {
                btnHombre.classList.add('active');
                btnMujer.classList.remove('active');
            } else {
                btnMujer.classList.add('active');
                btnHombre.classList.remove('active');
            }
        }

        // Seleccionar hombre por defecto
        seleccionarGenero('hombre');

        function guardarYAvanzar() {
            localStorage.setItem('basica_genero', generoSeleccionado);
            window.location.href = 'basica-paso2.html';
        }
    </script>
</body>
</html>
