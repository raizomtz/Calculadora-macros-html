<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Calculadora Pro - Paso 3 | Fitness Gym</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="calculadora-container">
        <div class="calculadora-wrapper">
            
            <!-- Header -->
            <div class="calc-header">
                <a href="index.html" class="back-link">← Volver al menú</a>
                <h1 class="calc-title">
                    Calculadora <span class="calc-title-red">Pro</span>
                </h1>
                <!-- Barra de progreso -->
                <div class="progress-bar">
                    <div class="progress-step done">✓</div>
                    <div class="progress-line"></div>
                    <div class="progress-step done">✓</div>
                    <div class="progress-line"></div>
                    <div class="progress-step active">3</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Tu meta</label>
                <select id="objetivo" class="form-select">
                    <option value="perder">Perder Grasa (Definición)</option>
                    <option value="recomposicion">Recomposición (Gana músculo / pierde grasa)</option>
                    <option value="ganar">Ganar Masa Muscular (Volumen)</option>
                </select>
            </div>

            <div class="flex gap-2">
                <button class="btn-paso-atras w-1-3" onclick="volver()">Atrás</button>
                <button class="btn-paso-siguiente w-2-3" onclick="calcularYAvanzar()">Calcular</button>
            </div>
        </div>
    </div>

    <script>
        function calcularYAvanzar() {
            const objetivo = document.getElementById('objetivo').value;
            localStorage.setItem('pro_objetivo', objetivo);
            
            // Recuperar todos los datos
            const peso = localStorage.getItem('pro_peso');
            const grasa = localStorage.getItem('pro_grasa');
            const actividad = localStorage.getItem('pro_actividad');
            
            // Construir URL con los datos
            const url = `pro-resultado.html?peso=${peso}&grasa=${grasa}&actividad=${actividad}&objetivo=${objetivo}`;
            window.location.href = url;
        }

        function volver() {
            window.location.href = 'pro-paso2.html';
        }
    </script>
</body>
</html>
