<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Calculadora Básica - Paso 2 | Fitness Gym</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="calculadora-container">
        <div class="calculadora-wrapper">
            
            <div class="calc-header">
                <a href="index.html" class="back-link">← Volver al menú</a>
                <h1 class="calc-title">
                    Calculadora <span class="calc-title-red">Básica</span>
                </h1>
                <div class="progress-bar">
                    <div class="progress-step done">✓</div>
                    <div class="progress-line"></div>
                    <div class="progress-step active">2</div>
                    <div class="progress-line"></div>
                    <div class="progress-step">3</div>
                    <div class="progress-line"></div>
                    <div class="progress-step">4</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Peso (kg)</label>
                <input type="number" id="peso" class="form-input" placeholder="Ej: 75.5" step="0.1">
            </div>

            <div class="form-group">
                <label class="form-label">Altura (cm)</label>
                <input type="number" id="altura" class="form-input" placeholder="Ej: 175" step="0.1">
            </div>

            <div class="form-group">
                <label class="form-label">Edad</label>
                <input type="number" id="edad" class="form-input" placeholder="Ej: 30">
            </div>

            <div class="flex gap-2">
                <button class="btn-secondary w-1/3" onclick="volver()">Atrás</button>
                <button class="btn-primary w-2/3" onclick="guardarYAvanzar()">Siguiente</button>
            </div>
        </div>
    </div>

    <script src="js/calculadora.js"></script>
    <script>
        function guardarYAvanzar() {
            const peso = document.getElementById('peso').value;
            const altura = document.getElementById('altura').value;
            const edad = document.getElementById('edad').value;

            if (!peso || !altura || !edad) {
                mostrarError('Por favor completa todos los campos para continuar.');
                return;
            }

            if (parseFloat(peso) < 20 || parseFloat(peso) > 300) {
                mostrarErrorRango('El peso', 20, 300);
                return;
            }

            if (parseFloat(altura) < 50 || parseFloat(altura) > 250) {
                mostrarErrorRango('La altura', 50, 250);
                return;
            }

            if (parseInt(edad) < 12 || parseInt(edad) > 120) {
                mostrarErrorRango('La edad', 12, 120);
                return;
            }

            localStorage.setItem('basica_peso', peso);
            localStorage.setItem('basica_altura', altura);
            localStorage.setItem('basica_edad', edad);

            window.location.href = 'basica-paso3.html';
        }

        function volver() {
            window.location.href = 'basica-paso1.html';
        }
    </script>
</body>
</html>
